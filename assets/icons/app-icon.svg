<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">D-Bus Inspector app icon</title>
  <desc id="desc">A playful yellow bus travelling around a glowing connected message bus route with circular nodes and a magnifying glass for inspection.</desc>

  <defs>
    <linearGradient id="bg" x1="84" y1="42" x2="934" y2="984" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a1a4a"/>
      <stop offset="0.45" stop-color="#071a3d"/>
      <stop offset="1" stop-color="#030816"/>
    </linearGradient>

    <radialGradient id="bgGlow" cx="50%" cy="45%" r="65%">
      <stop offset="0" stop-color="#0c72d9" stop-opacity="0.36"/>
      <stop offset="0.48" stop-color="#0758b6" stop-opacity="0.17"/>
      <stop offset="1" stop-color="#00102f" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="routeGradient" x1="136" y1="262" x2="881" y2="811" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7b62ff"/>
      <stop offset="0.25" stop-color="#21d8ff"/>
      <stop offset="0.54" stop-color="#1df2d1"/>
      <stop offset="0.78" stop-color="#15b3ff"/>
      <stop offset="1" stop-color="#695cff"/>
    </linearGradient>

    <linearGradient id="nodeCyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#85fff3"/>
      <stop offset="1" stop-color="#0db5ff"/>
    </linearGradient>
    <linearGradient id="nodeBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9bb7ff"/>
      <stop offset="1" stop-color="#2b65ff"/>
    </linearGradient>
    <linearGradient id="nodePurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d4a1ff"/>
      <stop offset="1" stop-color="#7448f4"/>
    </linearGradient>
    <linearGradient id="nodeGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8bffbc"/>
      <stop offset="1" stop-color="#18d382"/>
    </linearGradient>

    <linearGradient id="busBody" x1="260" y1="335" x2="625" y2="550" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffe96a"/>
      <stop offset="0.43" stop-color="#ffbd25"/>
      <stop offset="1" stop-color="#f28b12"/>
    </linearGradient>
    <linearGradient id="busSide" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffd95a"/>
      <stop offset="1" stop-color="#f29414"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d4d81"/>
      <stop offset="0.55" stop-color="#0a2d5d"/>
      <stop offset="1" stop-color="#031533"/>
    </linearGradient>
    <linearGradient id="magnifier" x1="635" y1="668" x2="798" y2="824" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7efeff"/>
      <stop offset="0.52" stop-color="#17b9ff"/>
      <stop offset="1" stop-color="#5f6bff"/>
    </linearGradient>
    <radialGradient id="lensFill" cx="42%" cy="32%" r="70%">
      <stop offset="0" stop-color="#092c65" stop-opacity="0.45"/>
      <stop offset="0.62" stop-color="#061b42" stop-opacity="0.78"/>
      <stop offset="1" stop-color="#020b22" stop-opacity="0.98"/>
    </radialGradient>

    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#000814" flood-opacity="0.45"/>
    </filter>
    <filter id="tightShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#000000" flood-opacity="0.34"/>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="nodeGlow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="iconClip">
      <rect x="22" y="22" width="980" height="980" rx="166"/>
    </clipPath>

    <style>
      .route-line { fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .node-ring { fill: none; stroke: rgba(255,255,255,.62); stroke-width: 8; }
      .node-core { stroke: rgba(255,255,255,.55); stroke-width: 3; }
      .tiny-highlight { fill: #fff; opacity: .82; }
      .window { fill: url(#glass); stroke: #0c1b38; stroke-width: 5; }
      .bus-line { stroke: #d37c00; stroke-width: 3; opacity: .4; }
    </style>
  </defs>

  <g clip-path="url(#iconClip)">
    <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>
    <rect x="0" y="0" width="1024" height="1024" fill="url(#bgGlow)"/>
    <circle cx="510" cy="500" r="355" fill="#062c63" opacity="0.20"/>
    <circle cx="510" cy="500" r="275" fill="#0a4a9f" opacity="0.10"/>

    <!-- glowing route shadow -->
    <path class="route-line" d="M 241 298 C 340 188 509 133 666 178 C 823 222 916 363 892 520 C 865 694 723 846 531 861 C 339 877 180 764 144 602 C 119 491 148 395 241 298 Z" stroke="#0ef5ff" stroke-width="44" opacity="0.12" filter="url(#glow)"/>

    <!-- main D-Bus route -->
    <path class="route-line" d="M 241 298 C 340 188 509 133 666 178 C 823 222 916 363 892 520 C 865 694 723 846 531 861 C 339 877 180 764 144 602 C 119 491 148 395 241 298 Z" stroke="url(#routeGradient)" stroke-width="31" opacity="0.98"/>
    <path class="route-line" d="M 241 298 C 340 188 509 133 666 178 C 823 222 916 363 892 520 C 865 694 723 846 531 861 C 339 877 180 764 144 602 C 119 491 148 395 241 298 Z" stroke="#a5ffff" stroke-width="7" opacity="0.42"/>

    <!-- motion hints behind bus -->
    <path d="M 647 291 C 727 335 768 406 761 494" fill="none" stroke="#0bbcff" stroke-width="16" stroke-linecap="round" opacity="0.22"/>
    <path d="M 677 314 C 724 349 748 395 748 447" fill="none" stroke="#7cfaff" stroke-width="5" stroke-linecap="round" stroke-dasharray="18 22" opacity="0.44"/>

    <!-- route nodes -->
    <g filter="url(#nodeGlow)">
      <g transform="translate(519 159)">
        <circle r="40" fill="url(#nodeCyan)" opacity="0.98"/>
        <circle r="24" fill="#0c75ba" opacity="0.45"/>
        <circle r="39" class="node-ring"/>
      </g>
      <g transform="translate(775 268)">
        <circle r="39" fill="url(#nodeCyan)"/>
        <circle r="23" fill="#083d91" opacity="0.45"/>
        <circle r="38" class="node-ring"/>
      </g>
      <g transform="translate(890 485)">
        <circle r="37" fill="url(#nodeCyan)"/>
        <circle r="21" fill="#064c99" opacity="0.45"/>
        <circle r="36" class="node-ring"/>
      </g>
      <g transform="translate(534 862)">
        <circle r="39" fill="url(#nodeGreen)"/>
        <circle r="22" fill="#075b6d" opacity="0.35"/>
        <circle r="38" class="node-ring"/>
      </g>
      <g transform="translate(253 762)">
        <circle r="39" fill="url(#nodeCyan)"/>
        <circle r="23" fill="#074c9c" opacity="0.42"/>
        <circle r="38" class="node-ring"/>
      </g>
      <g transform="translate(154 518)">
        <circle r="38" fill="url(#nodeBlue)"/>
        <circle r="22" fill="#143f8e" opacity="0.42"/>
        <circle r="37" class="node-ring"/>
      </g>
      <g transform="translate(232 292)">
        <circle r="38" fill="url(#nodePurple)"/>
        <circle r="23" fill="#40169d" opacity="0.32"/>
        <circle r="37" class="node-ring"/>
      </g>
    </g>

    <!-- bus shadow -->
    <ellipse cx="497" cy="480" rx="210" ry="86" fill="#000510" opacity="0.38" transform="rotate(-28 497 480)" filter="url(#softShadow)"/>

    <!-- bus -->
    <g transform="translate(510 430) rotate(-28)" filter="url(#tightShadow)">
      <!-- lower shadow side -->
      <rect x="-184" y="-59" width="368" height="118" rx="38" fill="#b95f08" opacity="0.45" transform="translate(9 13)"/>
      <rect x="-184" y="-59" width="368" height="118" rx="38" fill="url(#busBody)" stroke="#ffe27a" stroke-width="5"/>
      <path d="M -154 -56 H 146 C 166 -56 184 -38 184 -18 V 60 H -116 C -154 60 -184 30 -184 -8 V -26 C -184 -42 -171 -56 -154 -56 Z" fill="url(#busSide)" opacity="0.95"/>

      <!-- front windshield -->
      <rect x="-169" y="-41" width="82" height="82" rx="22" class="window"/>
      <path d="M -160 -33 L -101 -33 L -91 -4 L -91 31 L -160 31 Z" fill="#126ca0" opacity="0.36"/>
      <path d="M -153 -36 L -116 -36" stroke="#8fefff" stroke-width="5" stroke-linecap="round" opacity="0.5"/>

      <!-- side windows -->
      <rect x="-62" y="-41" width="46" height="82" rx="14" class="window"/>
      <rect x="-4" y="-41" width="46" height="82" rx="14" class="window"/>
      <rect x="54" y="-41" width="46" height="82" rx="14" class="window"/>
      <rect x="112" y="-41" width="42" height="82" rx="14" class="window"/>
      <path d="M -53 -33 H -26 M 4 -33 H 31 M 62 -33 H 89 M 120 -33 H 144" stroke="#78e7ff" stroke-width="5" stroke-linecap="round" opacity="0.25"/>

      <!-- roof plate and hatch -->
      <rect x="-31" y="-26" width="75" height="52" rx="14" fill="#0b315d" stroke="#ffe48b" stroke-width="3" opacity="0.97"/>
      <text x="6" y="11" font-family="Inter, Cantarell, Ubuntu, DejaVu Sans, Arial, sans-serif" font-size="34" font-weight="800" text-anchor="middle" fill="#eef6ff" letter-spacing="1">DB</text>
      <rect x="51" y="-20" width="52" height="40" rx="11" fill="#ffe36b" stroke="#fff4a6" stroke-width="3" opacity="0.93"/>

      <!-- details -->
      <path d="M -172 51 C -154 72 -111 76 -86 58" fill="none" stroke="#fff4a6" stroke-width="7" stroke-linecap="round" opacity="0.72"/>
      <circle cx="-172" cy="-31" r="7" fill="#fff7db"/>
      <circle cx="-172" cy="31" r="7" fill="#fff7db"/>
      <rect x="142" y="-32" width="18" height="64" rx="8" fill="#082144" opacity="0.55"/>
      <circle cx="-115" cy="64" r="22" fill="#071024"/>
      <circle cx="-115" cy="64" r="10" fill="#2c77a8"/>
      <circle cx="113" cy="64" r="22" fill="#071024"/>
      <circle cx="113" cy="64" r="10" fill="#2c77a8"/>
      <path d="M -68 52 H 88" class="bus-line"/>
      <path d="M -65 -52 H 89" stroke="#fffbd2" stroke-width="4" stroke-linecap="round" opacity="0.32"/>
    </g>

    <!-- magnifier integrated into route -->
    <g filter="url(#tightShadow)">
      <line x1="771" y1="803" x2="853" y2="886" stroke="#5267ff" stroke-width="35" stroke-linecap="round"/>
      <line x1="771" y1="803" x2="853" y2="886" stroke="#9fd0ff" stroke-width="14" stroke-linecap="round" opacity="0.32"/>
      <circle cx="704" cy="735" r="92" fill="url(#magnifier)"/>
      <circle cx="704" cy="735" r="70" fill="url(#lensFill)" stroke="#9fffff" stroke-width="5" opacity="0.98"/>
      <path d="M 669 700 C 690 680 730 681 751 704" fill="none" stroke="#d8ffff" stroke-width="5" stroke-linecap="round" opacity="0.28"/>
      <!-- graph inside lens -->
      <path d="M 670 755 L 707 720 L 745 761" fill="none" stroke="#77fbff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="670" cy="755" r="16" fill="#95ffff"/>
      <circle cx="707" cy="720" r="15" fill="#b8ffff"/>
      <circle cx="745" cy="761" r="17" fill="#74eaff"/>
    </g>

    <!-- small sparkle nodes -->
    <g opacity="0.72" filter="url(#nodeGlow)">
      <circle cx="369" cy="199" r="5" fill="#5ffbff"/>
      <circle cx="820" cy="368" r="6" fill="#6efcff"/>
      <circle cx="334" cy="833" r="4" fill="#b5ffcf"/>
      <circle cx="196" cy="667" r="5" fill="#64ddff"/>
      <circle cx="688" cy="188" r="4" fill="#7dfdff"/>
    </g>

    <!-- glossy edge -->
    <rect x="22" y="22" width="980" height="980" rx="166" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.07"/>
    <path d="M 134 37 H 864 C 937 37 987 93 994 156" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.05"/>
  </g>
</svg>
